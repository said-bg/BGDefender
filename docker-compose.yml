services:
  db:
    image: mysql:8.0
    container_name: bgdefender-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - bgdefender_mysql_data:/var/lib/mysql

volumes:
  bgdefender_mysql_data:
